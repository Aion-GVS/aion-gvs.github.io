<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Add your styles here */
        .hero {
            position: relative;
            overflow: hidden;
        }
        .circle-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            fill: currentColor;
            opacity: 0.1;
        }
        .framework-diagram {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        .icon {
            display: inline-block;
            margin: 10px;
            text-align: center;
        }
        .icon svg {
            fill: currentColor;
            opacity: 0.7;
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>
    <div class="hero">
        <svg class="circle-background">
            <circle cx="50%" cy="50%" r="40%" />
            <circle cx="50%" cy="50%" r="30%" />
            <circle cx="50%" cy="50%" r="20%" />
        </svg>
        <h1>Welcome to our Project</h1>
    </div>
    <section class="framework">
        <h2>Framework Visualization</h2>
        <div class="framework-diagram">
            <div>
                <h3>Self-Report</h3>
                <p>Description of self-report.</p>
            </div>
            <div>
                <h3>Verified Approaches</h3>
                <p>Description of verified approaches.</p>
            </div>
        </div>
    </section>
    <section class="evaluation">
        <h2>Evaluation Items</h2>
        <div class="icon">
            <svg>
                <symbol id="checkmark" viewBox="0 0 24 24">
                    <path d="M9 19l-7-7 2-2 5 5 12-12 2 2z" />
                </symbol>
                <use href="#checkmark" />
            </svg>
            <p>Checkmark Description</p>
        </div>
        <div class="icon">
            <svg>
                <symbol id="plus" viewBox="0 0 24 24">
                    <path d="M12 2v20M2 12h20" />
                </symbol>
                <use href="#plus" />
            </svg>
            <p>Plus Description</p>
        </div>
        <div class="icon">
            <svg>
                <symbol id="upload" viewBox="0 0 24 24">
                    <path d="M12 3v18m6-9l-6-6-6 6" />
                </symbol>
                <use href="#upload" />
            </svg>
            <p>Upload Arrow Description</p>
        </div>
        <div class="icon">
            <svg>
                <symbol id="network" viewBox="0 0 24 24">
                    <path d="M12 12l-5 5 5-5-5-5 5 5zm0-5l-5-5 5-5 5 5-5 5z" />
                </symbol>
                <use href="#network" />
            </svg>
            <p>Network Nodes Description</p>
        </div>
    </section>
</body>
</html>
